name: AntiGravity X CI

on:
  push:
    branches: [ "main" ]
  pull_request:
    branches: [ "main" ]

jobs:
  build-windows:
    name: Build Windows Executable
    runs-on: windows-latest
    steps:
    - uses: actions/checkout@v4

    - name: Configure CMake
      run: cmake -B build -DCMAKE_BUILD_TYPE=Release

    - name: Build
      run: cmake --build build --config Release

    - name: Prepare Artifact
      run: |
        mkdir -p dist
        cp build/Release/AntiGravityX.exe dist/
        cp -r "Datatype,Sekuya" dist/
      shell: bash

    - name: Upload Windows Artifact
      uses: actions/upload-artifact@v4
      with:
        name: AntiGravityX-Windows
        path: dist/

  build-android:
    name: Build Android APK
    runs-on: ubuntu-latest
    steps:
    - name: Checkout
      uses: actions/checkout@v4

    - name: Set up JDK 17
      uses: actions/setup-java@v4
      with:
        java-version: '17'
        distribution: 'temurin'

    - name: Setup Gradle
      uses: gradle/actions/setup-gradle@v3
      with:
        gradle-version: 8.4

    - name: Build Debug APK
      working-directory: android
      run: gradle assembleDebug --no-daemon

    - name: Build Release APK
      working-directory: android
      run: gradle assembleRelease --no-daemon

    - name: Upload Android APKs
      uses: actions/upload-artifact@v4
      with:
        name: AntiGravityX-APKs
        path: |
          android/app/build/outputs/apk/debug/app-debug.apk
          android/app/build/outputs/apk/release/app-release-unsigned.apk

    - name: Upload Native Libraries (.so)
      uses: actions/upload-artifact@v4
      with:
        name: AntiGravityX-NativeLibs
        path: android/app/workspace/intermediates/merged_native_libs/release/out/lib/**/*.so
